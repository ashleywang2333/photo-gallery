    <script>
      // 季节标签切换功能
      const tabButtons = document.querySelectorAll('.tab-button');
      const seasonGalleries = document.querySelectorAll('.season-gallery');

      tabButtons.forEach(button => {
        button.addEventListener('click', () => {
          const season = button.dataset.season;
          
          // 移除所有标签的激活状态
          tabButtons.forEach(btn => btn.classList.remove('active'));
          // 添加当前标签的激活状态
          button.classList.add('active');
          
          // 隐藏所有图集
          seasonGalleries.forEach(gallery => gallery.classList.remove('active'));
          // 显示当前季节的图集
          document.getElementById(season).classList.add('active');
        });
      });

      // 图片放大功能
      const modal = document.createElement('div');
      modal.className = 'modal';
      modal.id = 'portfolioModal';
      modal.innerHTML = `
        <span class="close">&times;</span>
        <button class="modal-prev">&lt;</button>
        <button class="modal-next">&gt;</button>
        <img class="modal-content" id="modalImage">
      `;
      document.body.appendChild(modal);

      const modalImg = document.getElementById('modalImage');
      const closeBtn = modal.querySelector('.close');
      const prevBtn = modal.querySelector('.modal-prev');
      const nextBtn = modal.querySelector('.modal-next');
      let currentImages = [];
      let currentIndex = 0;

      // 为所有图片添加点击事件
      document.querySelectorAll('.season-item img').forEach(img => {
        img.style.cursor = 'pointer';
        img.style.pointerEvents = 'auto';
        img.addEventListener('click', function() {
          // 获取当前季节的所有图片
          const seasonGallery = this.closest('.season-gallery');
          currentImages = Array.from(seasonGallery.querySelectorAll('img')).map(img => img.src);
          currentIndex = currentImages.indexOf(this.src);
          
          // 显示模态框
          modal.style.display = 'flex';
          modalImg.src = this.src;
        });
      });

      // 关闭模态框
      closeBtn.addEventListener('click', function() {
        modal.style.display = 'none';
      });

      // 点击模态框外部关闭
      window.addEventListener('click', function(event) {
        if (event.target == modal) {
          modal.style.display = 'none';
        }
      });

      // 上一张
      prevBtn.addEventListener('click', function() {
        currentIndex--;
        if (currentIndex < 0) {
          currentIndex = currentImages.length - 1;
        }
        modalImg.src = currentImages[currentIndex];
      });

      // 下一张
      nextBtn.addEventListener('click', function() {
        currentIndex++;
        if (currentIndex >= currentImages.length) {
          currentIndex = 0;
        }
        modalImg.src = currentImages[currentIndex];
      });
    </script>
